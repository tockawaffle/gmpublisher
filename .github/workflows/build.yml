name: build

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. 2.12.1)
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build_linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-node@v2

    - name: Install system dependencies
      run: |
        echo "deb http://archive.ubuntu.com/ubuntu jammy main universe" | sudo tee -a /etc/apt/sources.list
        sudo apt update
        sudo apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

    - name: Install NPM dependencies
      run: npm install

    - name: Build
      run: npm run tauri build -- -v

    - name: Prepare ZIP
      run: |
        cd src-tauri/target/release

        for lib in libwebkit2gtk-4.1-* libjavascriptcoregtk-4.1-*; do
          for path in $(ldd gmpublisher | awk '{print $3}' | grep "$lib"); do
            cp -v "$path" .
          done
        done

        patchelf --set-rpath '$ORIGIN' gmpublisher

        zip -r gmpublisher_linux64.zip gmpublisher libsteam_api.so libwebkit2gtk-4.1-* libjavascriptcoregtk-4.1-*

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        files: src-tauri/target/release/gmpublisher_linux64.zip
        fail_on_unmatched_files: true

  build_windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-node@v2

    - name: Install NPM dependencies
      run: npm install

    - name: Build
      run: npm run tauri build -- -v
      env:
        RUSTFLAGS: -Ctarget-feature=+crt-static

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        files: src-tauri/target/release/bundle/msi/gmpublisher_*.msi
        fail_on_unmatched_files: true

  build_macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v2

    - name: Install Rust targets
      run: |
        mkdir -p /tmp/rust-toolchain-plz
        cp src-tauri/rust-toolchain.toml /tmp/rust-toolchain-plz/
        cd /tmp/rust-toolchain-plz
        cargo init --lib
        cargo check
        rustup target add x86_64-apple-darwin

    - uses: actions/setup-node@v2

    - name: Install NPM dependencies
      run: npm install

    - name: Build
      run: npm run tauri build -- --target universal-apple-darwin -v

    - name: Copy Steamworks SDK to bundle
      run: cp src-tauri/lib/steam_api/redistributable_bin/osx/libsteam_api.dylib src-tauri/target/universal-apple-darwin/release/bundle/macos/gmpublisher.app/Contents/MacOS/libsteam_api.dylib

    - name: Prepare ZIP
      run: |
        cd src-tauri/target/universal-apple-darwin/release/bundle/macos
        zip -r gmpublisher_macOS.app.zip gmpublisher.app

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        files: src-tauri/target/universal-apple-darwin/release/bundle/macos/gmpublisher_macOS.app.zip
        fail_on_unmatched_files: true
